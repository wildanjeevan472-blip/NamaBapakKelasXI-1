<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Nama Orang Tua</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* Background pattern subtle */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(251, 191, 36, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #f8fafc;
            margin-bottom: 15px;
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
            margin: 25px auto 0;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            letter-spacing: 0.2em;
            font-weight: 300;
        }

        .name-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .name-item {
            padding: 25px 35px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: default;
        }

        .name-item:first-child {
            border-top: 1px solid rgba(251, 191, 36, 0.15);
        }

        .name-item:hover {
            background: rgba(251, 191, 36, 0.05);
            padding-left: 45px;
        }

        .name-item:hover::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: #fbbf24;
        }

        .name-text {
            font-size: 1.4rem;
            font-weight: 400;
            color: #f1f5f9;
            letter-spacing: 0.05em;
        }

        .name-meaning {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
            font-style: italic;
            letter-spacing: 0.03em;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 30px;
            border-top: 1px solid rgba(251, 191, 36, 0.1);
        }

        .footer-text {
            font-size: 0.8rem;
            color: #475569;
            letter-spacing: 0.15em;
        }

        /* Decorative corner elements */
        .corner {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            pointer-events: none;
        }

        .corner-tl {
            top: 30px;
            left: 30px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 30px;
            right: 30px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 30px;
            left: 30px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 30px;
            right: 30px;
            border-left: none;
            border-top: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
                letter-spacing: 0.15em;
            }
            
            .name-text {
                font-size: 1.1rem;
            }
            
            .name-item {
                padding: 20px 25px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Decorative corners -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
        <header>
            <h1>Koleksi Nama Orang Tua</h1>
            <p class="subtitle">Nama-nama Orang Tua Kelas 11.1</p>
        </header>

        <div class="name-list">
            <div class="name-item">
                <div class="name-text">Udin</div>
    
            </div>
            <div class="name-item">
                <div class="name-text">Raseh</div>
        
            </div>
            <div class="name-item">
                <div class="name-text">Nur</div>
        
            </div>
            <div class="name-item">
                <div class="name-text">Bambang</div>
        
            </div>
            <div class="name-item">
                <div class="name-text">Iyan</div>

            </div>
            <div class="name-item">
                <div class="name-text">Herdi</div>
        
            </div>
            <div class="name-item">
                <div class="name-text">Shoheh</div>
            </div>
            <div class="name-item">
                <div class="name-text">Busyiri</div>
            
            </div>
            <div class="name-item">
                <div class="name-text">Rodi</div>
    
            </div>
    
        </div>

        <footer>
            <p class="footer-text">NAMA NAMA ORANG TUA</p>
        </footer>
    </div>
</body>
</html>
